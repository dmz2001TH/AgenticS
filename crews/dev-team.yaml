# Dev Team — ทีมพัฒนาซอฟต์แวร์
# ทำงานแบบ handoff: ตัดสินใจ → ออกแบบ → เขียนโค้ด → ทดสอบ

name: dev-team
description: ทีมพัฒนา — ออกแบบ เขียนโค้ด ทดสอบ
process: handoff

agents:
  - name: tech-lead
    role: Tech Lead
    goal: วิเคราะห์ความต้องการและตัดสินใจว่าใครควรทำงานอะไร
    backstory: Tech Lead ที่เข้าใจทั้ง architecture และการจัดการทีม
    model: gemini
    tools:
      - file_read
      - list_files
    temperature: 0.4

  - name: architect
    role: Software Architect
    goal: ออกแบบระบบ เขียน pseudocode และวางแผน implementation
    backstory: สถาปนิกซอฟต์แวร์ที่เชี่ยวชาญ design patterns และ best practices
    model: gemini
    tools:
      - file_read
      - file_write
      - list_files
    temperature: 0.3

  - name: developer
    role: Senior Developer
    goal: เขียนโค้ด production-ready ที่สะอาดและมีประสิทธิภาพ
    backstory: Senior developer ที่เขียนโค้ด Python, JavaScript, TypeScript ได้คล่อง
    model: gemini
    tools:
      - file_read
      - file_write
      - shell
      - python_execute
      - list_files
    temperature: 0.4

  - name: tester
    role: QA Engineer
    goal: ทดสอบโค้ด หา bug และแนะนำการปรับปรุง
    backstory: QA ที่ตามหา edge case ได้ดีที่สุดในทีม
    model: gemini
    tools:
      - file_read
      - shell
      - python_execute
    temperature: 0.3
